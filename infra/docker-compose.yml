version: '3.8'

name: game-recommender
services:
  redis:
    container_name: redis
    image: redis:7-alpine
    expose:
      - "6379"
    networks: [ playcure ]
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 3

  db-migrate:
    container_name: db-migrate
    build:
      context: ..
      dockerfile: services/backend/Dockerfile
      target: build
      platforms:
        - linux/amd64
    depends_on:
      game_recommender_ai_db:
        condition: service_healthy
    working_dir: /app/services/backend
    entrypoint: [ "mvn" ]
    command: >
      -B liquibase:update
      -Dliquibase.url=jdbc:postgresql://game_recommender_ai_db:5432/${POSTGRES_DB}
      -Dliquibase.username=${POSTGRES_USER}
      -Dliquibase.password=${POSTGRES_PASSWORD}
    networks: [ playcure ]

  backend:
    container_name: backend
    build:
      context: ..
      dockerfile: services/backend/Dockerfile
      platforms:
        - linux/amd64
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      game_recommender_ai_db:
        condition: service_healthy
      ai-service:
        condition: service_started
      redis:
        condition: service_started
    environment:
      - JAVA_OPTS=${JAVA_OPTS}
      - APPLICATION_BASE_URL=${APPLICATION_BASE_URL}
      - FRONTEND_BASE_URL=${FRONTEND_BASE_URL}
      - GRPC_AI_SERVICE_HOST=${GRPC_AI_SERVICE_HOST}
      - GRPC_AI_SERVICE_PORT=${GRPC_AI_SERVICE_PORT}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - REFRESH_TOKEN_COOKIE_NAME=${REFRESH_TOKEN_COOKIE_NAME}
      - COOKIE_MAX_AGE=${COOKIE_MAX_AGE}
      - COOKIE_SECURE=${COOKIE_SECURE}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - REDIS_REDIS_URI=${REDIS_REDIS_URI}
      - SPRING_REDIS_HOST=${SPRING_REDIS_HOST}
      - SPRING_REDIS_PORT=${SPRING_REDIS_PORT}
      - STEAM_API_KEY=${STEAM_API_KEY}
    ports:
      - "8080:8080"
    networks: [ playcure ]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  ai-service:
    container_name: ai-service
    build:
      context: ..
      dockerfile: services/ai-service/Dockerfile
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - GIGACHAT_API_KEY=${GIGACHAT_API_KEY}
      - GRPC_PORT=${GRPC_PORT}
      - HTTP_PORT=${HTTP_PORT}
    expose:
      - "8000"  # FastAPI health/metrics
      - "9090"  # gRPC
    networks: [ playcure ]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  game_recommender_ai_db:
    container_name: game-recommender-postgres-db
    image: postgres:17.4
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    expose:
      - "5432"
    networks: [ playcure ]
    volumes:
      - game_recommender_ai_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 30s
      timeout: 10s
      retries: 5

  pgadmin:
    container_name: pgadmin
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_LISTEN_PORT: 5050
    ports:
      - "${PGADMIN_PORT}:5050"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks: [ playcure ]
    depends_on:
      game_recommender_ai_db:
        condition: service_healthy

networks:
  playcure:
    driver: bridge

volumes:
  game_recommender_ai_data:
  pgadmin_data:
  # Optional: persist data if needed
  # backend-data:
  # ai-service-data:
