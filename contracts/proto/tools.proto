syntax = "proto3";

package gamerecommender;

option go_package = "github.com/playcure/gamerecommender";
option java_package = "ru.perevalov.gamerecommenderai.grpc";
option java_multiple_files = true;

service JavaToolsService {
  rpc GetSteamAppDetails(SteamAppRequest) returns (SteamAppResponse);
  rpc GetSimilarGames(SimilarGamesRequest) returns (SimilarGamesResponse);
  // (опц)
  rpc SearchGames(SearchGamesRequest) returns (SearchGamesResponse);
}

message SteamAppRequest {
  int32 app_id = 1;
}

message SteamAppResponse {
  int32 app_id = 1;
  string name = 2;
  string description = 3;
  repeated string genres = 4;
}

message SimilarGamesRequest {
  int32 app_id = 1;
  int32 limit = 2;
}

message SimilarGamesResponse {
  repeated SteamAppResponse games = 1;
}

message SearchGamesRequest {
  string query = 1;
  int32 limit = 2;
}

message SearchGamesResponse {
  repeated SteamAppResponse games = 1;
}